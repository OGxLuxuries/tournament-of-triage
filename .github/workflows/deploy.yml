name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (app + convex)
        run: npm run typecheck

      # Build remotely on Vercel: "Sensitive" env vars are only decrypted
      # inside Vercel's builders, so a local `vercel build` here would bake
      # the literal "[SENSITIVE]" placeholder into the bundle.
      - name: Deploy to production (remote build)
        run: npx vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
